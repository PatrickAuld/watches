name: Build Wear Modules

on:
  push:
    branches: [main]
    paths:
      - 'faces/**/watchface.xml'
      - 'faces/**/assets/**'
      - 'faces/**/wear/**'
      - 'apps/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'buildSrc/**'
  pull_request:
    paths:
      - 'faces/**/watchface.xml'
      - 'faces/**/assets/**'
      - 'faces/**/wear/**'
      - 'apps/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'buildSrc/**'
  workflow_dispatch:

jobs:
  build-sundial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Sundial debug APK
        run: ./gradlew :faces:sundial:wear:assembleDebug

      - name: Generate build metadata
        run: |
          APK_DIR=faces/sundial/wear/build/outputs/apk/debug
          cat > "$APK_DIR/metadata.json" << EOF
          {
            "slug": "sundial",
            "name": "Sundial",
            "commitSha": "${{ github.sha }}",
            "buildType": "debug",
            "versionName": "0.1.0",
            "versionCode": 1,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runId": "${{ github.run_id }}",
            "runNumber": ${{ github.run_number }}
          }
          EOF

      - name: Upload Sundial artifact
        uses: actions/upload-artifact@v4
        with:
          name: sundial-debug
          path: |
            faces/sundial/wear/build/outputs/apk/debug/*.apk
            faces/sundial/wear/build/outputs/apk/debug/metadata.json
          retention-days: 90

  build-watch-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build watch companion debug APK
        run: ./gradlew :apps:watch:assembleDebug

      - name: Upload watch companion artifact
        uses: actions/upload-artifact@v4
        with:
          name: watch-companion-debug
          path: apps/watch/build/outputs/apk/debug/*.apk
          retention-days: 90

  build-phone-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build phone app debug APK
        run: ./gradlew :apps:phone:assembleDebug

      - name: Upload phone app artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-app-debug
          path: apps/phone/build/outputs/apk/debug/*.apk
          retention-days: 90

  publish-release:
    needs: [build-sundial, build-watch-companion, build-phone-app]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="sundial-v0.1.0-build.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Build #${{ github.run_number }}" \
            --notes "Automated build from commit ${{ github.sha }}" \
            artifacts/sundial-debug/*.apk \
            artifacts/sundial-debug/metadata.json \
            artifacts/watch-companion-debug/*.apk \
            artifacts/phone-app-debug/*.apk
