<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WFF Preview Lab</title>
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>WFF Preview Lab</h1>
        <p>WFF v4 XML watch face preview powered by wff-web</p>
      </header>

      <div class="layout">
        <div>
          <div class="watch-frame">
            <div class="watch-screen">
              <canvas id="watch-canvas" width="450" height="450"></canvas>
              <div id="placeholder" class="placeholder" style="display:none">Select a face</div>
            </div>
          </div>
        </div>

        <div class="sidebar">
          <div class="card controls">
            <h3>Face</h3>
            <label>
              <span>Watch face</span>
              <select id="face-picker"></select>
            </label>
          </div>

          <div class="card controls">
            <h3>Time</h3>
            <label>
              <span>Mode</span>
              <select id="time-mode">
                <option value="fixed">Fixed</option>
                <option value="live">Live</option>
              </select>
            </label>
            <label>
              <span>Time</span>
              <input type="datetime-local" id="time-input" />
            </label>
            <div class="button-row">
              <button data-set-time="10:10">10:10</button>
              <button data-set-time="12:00">12:00</button>
              <button data-set-time="15:30">3:30</button>
              <button data-set-time="21:45">9:45</button>
              <button data-set-time="00:00">00:00</button>
            </div>
          </div>

          <div class="card controls">
            <h3>Display</h3>
            <label style="flex-direction:row;align-items:center;gap:10px;display:flex">
              <input type="checkbox" id="ambient-toggle" />
              <span>Ambient mode</span>
            </label>
            <label style="flex-direction:row;align-items:center;gap:10px;display:flex">
              <input type="checkbox" id="animate-toggle" />
              <span>Animate (live rendering)</span>
            </label>
          </div>

          <div class="card meta">
            <h3>Metadata</h3>
            <div id="meta-panel"><p style="color:var(--muted)">Select a face</p></div>
          </div>
        </div>
      </div>

      <footer>
        WFF Preview Lab &mdash; faces rendered from canonical watchface.xml via wff-web
      </footer>
    </main>

    <script type="module">
      import { renderWatchFace } from 'https://cdn.jsdelivr.net/npm/wff-web@0.1.0/dist/index.js';
      window.renderWatchFace = renderWatchFace;
    </script>
    <script defer src="preview.js"></script>
  </body>
</html>
